<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fcfcf9" />
      <stop offset="100%" stop-color="#f5f3ec" />
    </linearGradient>
    <linearGradient id="logoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E52B50" />
      <stop offset="100%" stop-color="#FF8C00" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <stop offset="0%" stop-color="#000" stop-opacity="0.1" />
      <feGaussianBlur in="SourceAlpha" stdDeviation="10" />
      <feOffset dx="0" dy="10" result="offsetblur" />
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.05" />
      </feComponentTransfer>
      <feMerge>
        <feMergeNode />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>
  
  <rect width="1200" height="630" fill="url(#bgGrad)" />
  
  {/* Architectural Background Pattern */}
  <path d="M0 630 L1200 0" stroke="#000" stroke-width="0.5" opacity="0.03" />
  <path d="M0 0 L1200 630" stroke="#000" stroke-width="0.5" opacity="0.03" />

  {/* Main Brand Element */}
  <g transform="translate(600, 250)" filter="url(#shadow)">
    <path d="M-60 110 L0 0" stroke="#000" stroke-width="8" stroke-linecap="round" opacity="0.1" />
    <path d="M0 0 L60 110" stroke="#000" stroke-width="8" stroke-linecap="round" opacity="0.1" />
    <path d="M-80 60 L0 0" stroke="#000" stroke-width="4" stroke-linecap="round" stroke-dasharray="2 12" opacity="0.2" />
    <path d="M0 0 L100 80" stroke="url(#logoGrad)" stroke-width="14" stroke-linecap="round" />
  </g>

  {/* Typography */}
  <text x="600" y="420" text-anchor="middle" font-family="Montserrat, sans-serif" font-weight="200" font-size="64" letter-spacing="24" fill="#1a1a1a">itamars colors</text>
  <text x="600" y="480" text-anchor="middle" font-family="Cormorant Garamond, serif" font-weight="300" font-style="italic" font-size="28" letter-spacing="4" fill="rgba(26,26,26,0.5)">The Curated Visual Vocabulary & Perceptual Learning Game</text>

  {/* Footer Detail */}
  <rect x="550" y="540" width="100" height="1" fill="rgba(0,0,0,0.1)" />
</svg>
